name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  # Opt-in to Node.js 24 ahead of the June 16, 2026 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist + wheel (isolated output dir)
        run: |
          rm -rf dist-pypi
          python -m build --outdir dist-pypi
          ls -la dist-pypi/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist-pypi/

  publish:
    name: Publish to PyPI (Trusted Publisher / OIDC)
    needs: build
    runs-on: ubuntu-latest
    # No environment required for trusted-publisher unless you configured one.
    permissions:
      id-token: write   # REQUIRED for OIDC trusted publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist-pypi/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-pypi/
        # Trusted Publisher: no username/password/token required.
        # Make sure PyPI project trusted-publisher config points to:
        #   owner/repo  : (this repo)
        #   workflow    : publish.yml
        #   environment : (blank)
